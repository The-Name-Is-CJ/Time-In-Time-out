<!DOCTYPE html>
<html>
<head>
    <title>Reports</title>
    <link rel="stylesheet" href="reports.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

    <div class="sidenav">
    
        <div class="logo">
            <i class='bx bx-group'></i>
            <p>Community Services</p>
        </div>

        <a href="addlist.html">
            <i class='bx bx-list-plus'></i> Add List
        </a>

        <a href="trackTime.html">
            <i class='bx bx-time-five'></i> Track Time
        </a>

        <a href="reports.html" class="active">
            <i class='bx bx-bar-chart-alt-2'></i> Reports
        </a>

    </div>

   <div class="main">
    <h2>Reports Dashboard</h2>

    <div class="report-controls">
        <div class="control-group">
            <label>Filter by Date:</label>
            <input type="date" id="reportDatePicker" onchange="showReport()">
            <button onclick="clearDateFilter()" class="btn-secondary">Show All Dates</button>
        </div>
        <button onclick="exportTableToCSV('studentListTable', 'Student_Service_List')" class="btn-excel">
            <i class='bx bxs-file-export'></i> Export List to Excel
        </button>
        <button onclick="exportTableToCSV('attendanceTable', 'Attendance_Report')" class="btn-excel">
            <i class='bx bxs-spreadsheet'></i> Export Attendance to Excel
        </button>
    </div>

    <div class="report-section">
            <h3>Student Service Registry</h3>
            <table class="report-table" id="studentListTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Section</th>
                        <th>Reason</th>
                        <th>Scheduled Dates</th>
                    </tr>
                </thead>
                <tbody id="studentListContent"></tbody>
            </table>
        </div>

        <div class="report-section">
            <h3>Time Log (In/Out Records)</h3>
            <table class="report-table" id="attendanceTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Date</th>
                        <th>Morning In/Out</th>
                        <th>After Break In/Out</th>
                        <th>After Lunch In/Out</th>
                    </tr>
                </thead>
                <tbody id="attendanceContent"></tbody>
            </table>
        </div>
    </div>
    <script src="reports.js"></script>
</body>
</html>
