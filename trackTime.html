<!DOCTYPE html>
<html>
<head>
    <title>Track Time</title>
    <link rel="stylesheet" href="trackTime.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
</head>
<body>

    <div class="sidenav">
    
        <div class="logo">
            <i class='bx bx-group'></i>
            <p>Community Services</p>
        </div>

        <a href="index.html">
            <i class='bx bx-list-plus'></i> Add List
        </a>

        <a href="trackTime.html" class="active">
            <i class='bx bx-time-five'></i> Track Time
        </a>

        <a href="javascript:void(0)" onclick="accessReports()">
            <i class='bx bx-bar-chart-alt-2'></i> Reports
        </a>

    </div>

    <div class="main">
    <h2>TIME IN/TIME OUT</h2>

    <div class="form-container">
        <h3>Select Date</h3>
        <div class="date-row">
            <div class="input-group"> 
                <i class='bx bx-calendar' style="position: absolute; margin: 13px; color: #4a4a4a; z-index: 1;"></i>
                <input type="text" id="selectedDate" placeholder="Select a date..." readonly>
            </div>
        </div>
    </div>

    <div class="list-container">
        <h3>Scheduled Students</h3>

        <table class="track-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Section</th>
                    <th>MORNING (AM)</th>
                    <th>AFTER BREAK (AM)</th>
                    <th>AFTER LUNCH (PM)</th>
                </tr>
            </thead>
            <tbody id="scheduleTable">
                <tr>
                    <td>Jane Doe</td>
                    <td>BSIT 3-A</td>
                    <td>
                        <div>
                            <span>08:00 AM</span>
                            <button class="track-btn">Time In</button>
                        </div>
                    </td>
                    <td>
                        <div>
                            <span>--:--</span>
                            <button class="track-btn" disabled>Time In</button>
                        </div>
                    </td>
                    <td>
                        <div>
                            <span>--:--</span>
                            <button class="track-btn" disabled>Time In</button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
    <script src="trackTime.js"></script>
</body>
</html>
