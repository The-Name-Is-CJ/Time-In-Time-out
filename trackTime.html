<!DOCTYPE html>
<html>
<head>
    <title>Track Time</title>
    <link rel="stylesheet" href="trackTime.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

    <div class="sidenav">
    
        <div class="logo">
            <i class='bx bx-group'></i>
            <p>Community Services</p>
        </div>

        <a href="addlist.html">
            <i class='bx bx-list-plus'></i> Add List
        </a>

        <a href="trackTime.html" class="active">
            <i class='bx bx-time-five'></i> Track Time
        </a>

        <a href="reports.html">
            <i class='bx bx-bar-chart-alt-2'></i> Reports
        </a>

    </div>

    <div class="main">
        <h2>TIME IN/TIME OUT</h2>

        <div class="form-container">
            <h3>Select Date</h3>

            <input type="date" id="selectedDate">
            <button onclick="loadSchedule()">Show Schedule</button>
        </div>

        <!-- 📋 DISPLAY LIST -->
        <div class="list-container">
            <h3>Scheduled Students</h3>

            <table class="track-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Section</th>
                        <th>MORNING (AM)</th>
                        <th>AFTER BREAK (AM)</th>
                        <th>AFTER LUNCH (PM)</th>
                    </tr>
                </thead>
                <tbody id="scheduleTable"></tbody>
            </table>
        </div>

    </div>
    <script src="trackTime.js"></script>
</body>
</html>
