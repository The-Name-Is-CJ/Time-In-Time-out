<!DOCTYPE html>
<html>
<head>
    <title>Add List</title>
    <link rel="stylesheet" href="addlist.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'> 
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
</head>
<body> 

    <div class="sidenav">
    
        <div class="logo">
            <i class='bx bx-group'></i>
            <p>Community Services</p>
        </div>

        <a href="index.html" class="active">
            <i class='bx bx-list-plus'></i> Add List
        </a>

        <a href="trackTime.html">
            <i class='bx bx-time-five'></i> Track Time
        </a>

        <a href="reports.html">
            <i class='bx bx-bar-chart-alt-2'></i> Reports
        </a>

    </div>

    <div class="main">
        <h2>Student Community Service List</h2>

        <div class="form-container">
            <h3>Add Student</h3>

            <div class="calendar-wrapper">


                <div class="calendar">
                    <div class="calendar-header">
                        <button onclick="prevMonth()">‹</button>
                        <h4 id="monthYear"></h4>
                        <button onclick="nextMonth()">›</button>
                    </div>

                    <div class="calendar-days">
                        <div>Sun</div><div>Mon</div><div>Tue</div>
                        <div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
                    </div>

                    <div id="calendarDates" class="calendar-dates"></div>
                </div>

                <div class="calendar-side">
                    <button class="add-btn" onclick="openModal()">+ Add Event</button>

                    <div id="eventDisplay" class="event-display">
                        Click a marked date to see event
                    </div>
                </div>

            </div>
 
            <div id="eventModal" class="modal">
                <div class="modal-content">
                    <h3>Add NO Classes Date</h3>

                    <p id="selectedDatesText"></p>

                    <input type="text" id="eventReason" placeholder="Enter reason">

                    <div class="modal-buttons">
                        <button onclick="confirmBlock()">Confirm</button>
                        <button class="cancel-btn" onclick="closeModal()">Cancel</button>
                    </div>
                </div>
            </div> 

            <div id="editModal" class="modal" style="display:none;">
                <div class="modal-content">
                    <span class="close" onclick="closeEditModal()">&times;</span>
                    <h3>Edit NO Classes Date</h3>
                    <p id="editDateText" style="font-weight: bold; color: #d9534f;"></p>
                    
                    <label for="editReason">Reason/Event:</label>
                    <textarea id="editReason" rows="3" style="width: 100%; margin-top: 10px;"></textarea>

                    <div style="margin-top: 20px; display: flex; gap: 10px; justify-content: flex-end;">
                        <button class="delete-btn-modal" onclick="deleteBlock()">
                            <i class='bx bx-trash'></i> Unblock Date
                        </button>
                        <button onclick="updateBlock()">Save Changes</button> 
                        <button class="cancel-btn" onclick="closeEditModal()">Close</button>
                    </div>
                </div>
            </div>
 
            <div class="form-grid">
                <div class="left-col">
                    <label>Name: <span style="color:red;">*</span></label>
                    <input type="text" id="name" placeholder="Student Name">

                    <label style="margin-top: 10px;">Section: <span style="color:red;">*</span></label>
                    <input type="text" id="section" placeholder="Section">
                </div>

                <div class="right-col">
                    <label>Offense Type: <span style="color:red;">*</span></label>
                    <div class="radio-group" style="margin-bottom: 15px;">
                        <label><input type="radio" name="offenseType" value="Minor" checked> Minor Offense</label>
                        <label><input type="radio" name="offenseType" value="Major"> Major Offense</label>
                    </div>

                    <label>Reason for Community Service (One per line):</label>
                    <textarea id="serviceReason" placeholder="• Tardiness&#10;• Absence"></textarea>
                </div>
            </div>
        
    
            <div class="date-row">
                <div class="input-group">
                    <label>Start Date: <span style="color:red;">*</span></label>
                    <div class="date-input-wrapper" style="position: relative;"> 
                        <i class='bx bx-calendar' style="position: absolute; margin: 13px; color: #4a4a4a; z-index: 1;"></i>
                        <input type="text" id="startDate" placeholder="Select a date" readonly>
                    </div>
                </div>
                <div class="input-group">
                    <label>Number of Service Days:</label>
                    <input type="number" id="numDays" min="1" placeholder="e.g. 5">
                </div>
            </div>

            <div id="timeContainer" style="display:none;">
                <label>Hours (for 1-day service)</label>
                <div class="radio-group">
                    <label><input type="radio" name="hours" value="1"> 1 hr</label>
                    <label><input type="radio" name="hours" value="2"> 2 hrs</label>
                    <label><input type="radio" name="hours" value="3"> 3 hrs</label>
                    <label><input type="radio" name="hours" value="4"> 4 hrs</label>
                    <label><input type="radio" name="hours" value="5"> 5 hrs</label>
                    <label><input type="radio" name="hours" value="6"> 6 hrs</label>
                    <label><input type="radio" name="hours" value="7"> 7 hrs</label>
                    <label><input type="radio" name="hours" value="8"> 8 hrs</label>
                </div>
            </div>

            <div class="save-btn-container">
                <button class="save-btn" onclick="addStudent()">Save Student</button>
            </div>
        </div>

        <button onclick="masterReset()" class="master-reset-btn">
            <i class='bx bx-trash'></i> Reset All System Data
        </button>

        <div class="list-container">
            <h3>Student List</h3>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Section</th>
                        <th>Reason</th>
                        <th>Date/Time</th>
                        <th>Action</th> </tr>
                </thead>
                <tbody id="studentTable">
                </tbody>
            </table>
        </div>

    <script src="addlist.js"></script>
</body>
</html>
