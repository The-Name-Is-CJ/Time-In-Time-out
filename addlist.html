<!DOCTYPE html>
<html>
<head>
    <title>Add List</title>
    <link rel="stylesheet" href="addlist.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

    <!-- SIDE NAV -->
    <div class="sidenav">
    
        <div class="logo">
            <i class='bx bx-group'></i>
            <p>Community Services</p>
        </div>

        <a href="addlist.html" class="active">
            <i class='bx bx-list-plus'></i> Add List
        </a>

        <a href="trackTime.html">
            <i class='bx bx-time-five'></i> Track Time
        </a>

        <a href="reports.html">
            <i class='bx bx-bar-chart-alt-2'></i> Reports
        </a>

    </div>

    <!-- MAIN -->
    <div class="main">
        <h2>CHECK LIST</h2>

        <!-- 🔷 FORM CONTAINER -->
        <div class="form-container">
            <h3>Add Student</h3>

            <Label font-size:12px;>Name: </Label><label style="color:red; font-size:12px;">*required</label>
            <input type="text" id="name" placeholder="Student Name">
            
            <Label font-size:12px;>Section: </Label><label style="color:red; font-size:12px;">*required</label>
            <input type="text" id="section" placeholder="Section">
            
            <div class="date-group">
                <div>
                    <Label font-size:12px;>Start Date: </Label><label style="color:red; font-size:12px;">*required</label>
                    <input type="date" id="startDate">
                </div>

                <div>
                    <label>End Date (optional)</label>
                    <input type="date" id="endDate">
                </div>
            </div>

            <div id="timeContainer" style="display:none;">
                <label>Hours (for 1-day service)</label>
                
                <div class="radio-group">
                    <label><input type="radio" name="hours" value="1"> 1 hr</label>
                    <label><input type="radio" name="hours" value="2"> 2 hrs</label>
                    <label><input type="radio" name="hours" value="3"> 3 hrs</label>
                    <label><input type="radio" name="hours" value="4"> 4 hrs</label>
                    <label><input type="radio" name="hours" value="5"> 5 hrs</label>
                    <label><input type="radio" name="hours" value="6"> 6 hrs</label>
                    <label><input type="radio" name="hours" value="7"> 7 hrs</label>
                    <label><input type="radio" name="hours" value="8"> 8 hrs</label>
                </div>
            </div>

            <button onclick="addStudent()">Save</button>
        </div>

        <!-- 🔷 LIST DISPLAY -->
        <div class="list-container">
            <h3>Student List</h3>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Section</th>
                        <th>Date/Time</th>
                    </tr>
                </thead>
                <tbody id="studentTable">
                    <!-- JS will insert here -->
                </tbody>
            </table>
        </div>

    </div>

    <script src="addlist.js"></script>
</body>
</html>
